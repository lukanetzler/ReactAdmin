<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Fishing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #FDF9F3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
    font-family: sans-serif;
  }

  /* ── Outer card ── */
  #card {
    width: 100%;
    max-width: 360px;
    background: #F4EFE6;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 2px 24px rgba(67,52,34,0.08);
  }

  /* ── Arch header ── */
  #card-header {
    background: #FDF9F3;
    padding: 36px 32px 52px;
    text-align: center;
    position: relative;
  }
  #card-header .eyebrow {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.4em;
    color: #D4A373;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  #card-header h1 {
    font-family: 'Lora', Georgia, serif;
    font-size: 28px;
    line-height: 1.2;
    color: #433422;
  }
  #card-header h1 em {
    font-style: italic;
    color: #D4A373;
  }
  /* arch wave */
  #card-header::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -28px;
    height: 56px;
    background: #F4EFE6;
    border-top-left-radius: 100%;
    border-top-right-radius: 100%;
  }

  /* ── Canvas wrapper ── */
  #wrap {
    position: relative;
    margin: 0 auto;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-radius: 12px 12px 0 0;
  }
  /* top fade overlay */
  #canvas-fade-top {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 56px;
    background: linear-gradient(to top, transparent, #F4EFE6);
    pointer-events: none;
    border-radius: 12px 12px 0 0;
  }
  /* bottom fade overlay */
  #canvas-fade {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 72px;
    background: linear-gradient(to bottom, transparent, #F4EFE6);
    pointer-events: none;
  }

  /* ── HUD overlay ── */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: flex-start;
    padding: 10px 12px;
    pointer-events: none;
  }
  .hud-pill {
    background: rgba(253,249,243,0.82);
    color: #433422;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #status-pill { transition: color 0.15s, transform 0.15s; }
  #status-pill.bite {
    color: #c0392b;
    animation: throb 0.28s infinite alternate;
  }
  #status-pill.caught { color: #5a7a4a; }
  @keyframes throb {
    from { transform: scale(1);   }
    to   { transform: scale(1.12); }
  }

  /* ── Footer ── */
  #card-footer {
    padding: 16px 28px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #card-footer .caught-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #433422;
    opacity: 0.35;
  }
  #card-footer .caught-count {
    font-family: 'Lora', Georgia, serif;
    font-size: 22px;
    color: #433422;
  }
</style>
</head>
<body>
<div id="card">
  <div id="card-header">
    <p class="eyebrow">PrayVail</p>
    <h1>Calm<br><em>Fishing</em></h1>
  </div>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="hud">
      <div class="hud-pill" id="status-pill">~ Waiting...</div>
    </div>
    <div id="canvas-fade-top"></div>
    <div id="canvas-fade"></div>
  </div>
  <div id="card-footer">
    <span class="caught-label">Caught</span>
    <span class="caught-count" id="caught-pill">0</span>
  </div>
</div>
<script>
'use strict';

// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('wrap');

// Portrait canvas — matches Beta-SemiFinal.png natural ratio (1824×2346)
const W = 480, H = 617;
canvas.width  = W;
canvas.height = H;

let scale = 1;
function resize() {
  // Fit within card (max 360px wide), leave room for the arch header (~120px)
  const maxW = Math.min(window.innerWidth - 32, 360);
  const maxH = window.innerHeight - 140;
  scale = Math.min(maxW / W, maxH / H);
  const cw = Math.round(W * scale) + 'px', ch = Math.round(H * scale) + 'px';
  canvas.style.width  = cw; canvas.style.height = ch;
  wrap.style.width    = cw; wrap.style.height   = ch;
}
window.addEventListener('resize', resize);
resize();

// ── Asset loading ─────────────────────────────────────────────────────────────
const IMG  = {};
const SRCS = { scene: 'scene.png', water_tile: 'water-tile.png', surface_tile: 'surface-tile.png', barrel: 'barrel.png', fisherman: 'fisherman.png' };
let done = 0, total = Object.keys(SRCS).length;

function loadAll(cb) {
  Object.entries(SRCS).forEach(([k, src]) => {
    const img = new Image();
    img.src   = src;
    img.onload  = () => { IMG[k] = img; if (++done === total) cb(); };
    img.onerror = () => { IMG[k] = null; if (++done === total) cb(); };
  });
}

// ── Scene constants ───────────────────────────────────────────────────────────
const WATER_Y    = 318;          // waterline Y – confirmed via inspector
const ROD_PIVOT  = { x: 221, y: 116 };  // tip of fisherman sprite's rod

// ── Rod geometry (rod is on the sprite; just expose fixed tip coords) ─────────
function rodState() {
  return { tipX: ROD_PIVOT.x, tipY: ROD_PIVOT.y };
}

// ── Bobber ────────────────────────────────────────────────────────────────────
function bobberState(T, vibrate) {
  const rod  = rodState();
  const bob  = Math.sin(T * 3.4) * 3;
  const vib  = vibrate ? (Math.random() * 8 - 4) : 0;
  const castX = rod.tipX + 25;
  return { rod, x: castX + vib * 0.6, y: 365 + bob + vib * 0.4 };
}

// ── Fish (procedural – no sprite atlas) ──────────────────────────────────────
function spawnFish() {
  return {
    x:     Math.random() * W * 0.75 + W * 0.08,
    baseY: WATER_Y + 40 + Math.random() * (H - WATER_Y - 80),
    phase: Math.random() * Math.PI * 2,
    spd:   (0.22 + Math.random() * 0.38) * (Math.random() > 0.5 ? 1 : -1),
    size:  17 + Math.random() * 15,
    hue:   165 + Math.random() * 75,
    alive: true,
    catching: false,   // mid-catch animation
    catchProgress: 0,
  };
}

const pool = Array.from({ length: 5 }, spawnFish);

function drawFish(f, T, alpha) {
  const fy = f.baseY + Math.sin(T * 0.85 + f.phase) * 7;
  const s  = f.size;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(f.x, fy);
  if (f.spd < 0) ctx.scale(-1, 1);  // flip to face direction of travel

  // body
  ctx.beginPath();
  ctx.ellipse(0, 0, s, s * 0.42, 0, 0, Math.PI * 2);
  ctx.fillStyle = `hsl(${f.hue},52%,50%)`;
  ctx.fill();

  // tail
  ctx.beginPath();
  ctx.moveTo(-s * 0.72, 0);
  ctx.lineTo(-s * 1.22, -s * 0.44);
  ctx.lineTo(-s * 1.22,  s * 0.44);
  ctx.closePath();
  ctx.fillStyle = `hsl(${f.hue},48%,40%)`;
  ctx.fill();

  // dorsal fin
  ctx.beginPath();
  ctx.moveTo(s * 0.1, -s * 0.42);
  ctx.lineTo(s * 0.35, -s * 0.72);
  ctx.lineTo(-s * 0.15, -s * 0.42);
  ctx.closePath();
  ctx.fillStyle = `hsl(${f.hue},40%,45%)`;
  ctx.fill();

  // eye
  ctx.beginPath();
  ctx.arc(s * 0.54, -s * 0.07, s * 0.13, 0, Math.PI * 2);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.56, -s * 0.09, s * 0.05, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  ctx.restore();
}

// ── Game state ────────────────────────────────────────────────────────────────
let T            = 0;
let prevTS       = 0;
let waterOff     = 0;   // deep-water layer scroll
let causticsOff  = 0;   // caustics layer scroll (faster)
let surfaceOff   = 0;   // surface ripple scroll
let waterPat     = null;
let surfacePat   = null;  // recreated from Surface-Tile-2.png on first use
let biteTimer   = 0;
let biteActive  = false;
let biteEscape  = 0;
let caughtCount = 0;
let phase       = 'idle';

// ── Click animation state ─────────────────────────────────────────────────────
// t: elapsed seconds. Phases:
//   0–0.5  line reels in fast
//   0.5–0.9  line held at tip (peak excitement)
//   0.9–1.8  everything eases back
const CAST_DUR = 1.8;
let castAnim = null;  // null = idle, else { t: 0 }

function easeInOut(x) { return x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2)/2; }

function triggerCast() {
  castAnim = { t: 0 };
  tryClick();
}

// ── Input ─────────────────────────────────────────────────────────────────────
function tryClick() {
  if (!biteActive) return;
  const b = bobberState(T, true);
  let best = null, bestD = Infinity;
  pool.forEach(f => {
    if (!f.alive || f.catching) return;
    const fy = f.baseY + Math.sin(T * 0.85 + f.phase) * 7;
    const d  = Math.hypot(f.x - b.x, fy - b.y);
    if (d < bestD) { bestD = d; best = f; }
  });
  if (best) {
    best.catching = true;
    best.catchProgress = 0;
    biteActive = false;
    biteTimer  = 0;
    biteEscape = 0;
    phase = 'caught';
  }
}
// ── Inspector state ───────────────────────────────────────────────────────────
let inspectorX = 0, inspectorY = 0, inspectorVisible = false; // toggle with I key
let copiedFlash = 0; // countdown timer for "Copied!" flash

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  inspectorX = Math.round((e.clientX - rect.left) / scale);
  inspectorY = Math.round((e.clientY - rect.top)  / scale);
});

canvas.addEventListener('click', () => {
  if (inspectorVisible) {
    navigator.clipboard?.writeText(`x: ${inspectorX}, y: ${inspectorY}`);
    copiedFlash = 1.8;
  }
  triggerCast();
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); triggerCast(); }, { passive: false });

window.addEventListener('keydown', e => {
  if (e.key === 'i' || e.key === 'I') inspectorVisible = !inspectorVisible;
});

// ── Main loop ─────────────────────────────────────────────────────────────────
function frame(ts) {
  const dt = Math.min((ts - prevTS) * 0.001, 0.05);  // seconds, capped
  prevTS   = ts;
  T        = ts * 0.001;
  // ── Tick click animation ───────────────────────────────────────────────────
  let animRetract = 0, animJump = 0, animLean = 0;
  if (castAnim) {
    castAnim.t += dt;
    const t = castAnim.t;
    if (t >= CAST_DUR) { castAnim = null; }
    else {
      // Retract: reel in 0–0.5s, hold 0.5–0.9s, restore 0.9–1.8s
      if      (t < 0.5)  animRetract = easeInOut(t / 0.5);
      else if (t < 0.9)  animRetract = 1;
      else               animRetract = 1 - easeInOut((t - 0.9) / 0.9);
      // Jump: bell curve over full duration, peaks at midpoint
      animJump = Math.sin(t / CAST_DUR * Math.PI) * 13;
      // Barrel lean: bell curve, slightly ahead of jump
      animLean = Math.sin(Math.min(t / (CAST_DUR * 0.8), 1) * Math.PI) * 0.22;
    }
  }

  // Wrap at large exact multiples of each tile size so the reset is invisible.
  // water_tile.png = 560px wide → wrap at 560×100 = 56000
  // surface TS = 24px → wrap at 24×500 = 12000
  waterOff    = (waterOff    + dt * 22) % 56000;
  causticsOff = (causticsOff + dt * 40) % 56000;
  surfaceOff  = (surfaceOff  + dt * 18) % 12000;

  ctx.clearRect(0, 0, W, H);

  // 1 ── Full scene image (sky + pier, pixel-perfect above waterline)
  if (IMG.scene) ctx.drawImage(IMG.scene, 0, 0, W, H);
  else { ctx.fillStyle = '#7ec8e3'; ctx.fillRect(0, 0, W, H); }
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  if (IMG.barrel) {
    const dw = 35, dh = Math.round(dw * 2346 / 1824);
    const bx = 137, by = 170;  // barrel base position
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(-animLean);  // lean left on catch
    ctx.drawImage(IMG.barrel, -dw / 2, -dh, dw, dh);
    ctx.restore();
  }

  if (IMG.fisherman) {
    const dh = 180, dw = Math.round(dh * 1824 / 2346);
    ctx.drawImage(IMG.fisherman, 158 - dw / 2, 216 - dh - animJump, dw, dh);
  }

  // 2 ── Zone B water (below WATER_Y) — dual-layer parallax per spec
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, WATER_Y, W, H - WATER_Y);
  ctx.clip();

  // Layer 1 – deep water base: solid tint + slow-scroll tile
  ctx.fillStyle = 'rgba(18, 52, 100, 0.75)';
  ctx.fillRect(0, WATER_Y, W, H - WATER_Y);
  if (IMG.water_tile) {
    if (!waterPat) waterPat = ctx.createPattern(IMG.water_tile, 'repeat');
    waterPat.setTransform(new DOMMatrix().translate(-(waterOff % 560), 0));
    ctx.globalAlpha = 0.65;
    ctx.fillStyle   = waterPat;
    ctx.fillRect(0, WATER_Y, W, H - WATER_Y);
  }

  // Layer 2 – caustics shimmer: same tile at faster offset + lighter tint
  if (IMG.water_tile) {
    waterPat.setTransform(new DOMMatrix().translate(-(causticsOff % 560), 0));
    ctx.globalAlpha = 0.35;
    ctx.fillStyle   = waterPat;
    ctx.fillRect(0, WATER_Y, W, H - WATER_Y);
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  // 3 ── Fish (drawn semi-transparent for the "underwater" look)
  const b = bobberState(T, biteActive);

  let nearBobber = false;
  pool.forEach(f => {
    if (!f.alive) return;

    // Catch animation
    if (f.catching) {
      f.catchProgress += dt * 1.5;
      // lerp toward rod pivot
      f.x     += (ROD_PIVOT.x - f.x)     * dt * 4;
      f.baseY += (ROD_PIVOT.y - f.baseY) * dt * 4;
      drawFish(f, T, Math.max(0, 1 - f.catchProgress * 1.8));
      if (f.catchProgress >= 0.65) {
        f.alive    = false;
        f.catching = false;
        caughtCount++;
        phase = 'idle';
        setTimeout(() => pool.push(spawnFish()), 3500);
      }
      return;
    }

    // Normal swim
    f.x += f.spd * dt * 55;
    if (f.x > W + 70) f.x = -70;
    if (f.x < -70)    f.x = W + 70;

    drawFish(f, T, 0.72);  // semi-transparent = underwater

    // Bite proximity check
    const fy = f.baseY + Math.sin(T * 0.85 + f.phase) * 7;
    if (Math.hypot(f.x - b.x, fy - b.y) < 34) nearBobber = true;
  });

  // Bite timer
  if (nearBobber) {
    biteEscape = 0;
    if (!biteActive) {
      biteTimer += dt;
      if (biteTimer >= 2) { biteActive = true; phase = 'bite'; }
    }
  } else if (biteActive) {
    biteEscape += dt;
    if (biteEscape > 4) {  // fish swam away after 4 s
      biteActive = false; biteTimer = 0; biteEscape = 0; phase = 'idle';
    }
  } else {
    biteTimer = 0;
  }

  // 4 ── Zone B refraction: redraw scene below waterline with sine horizontal shift
  if (IMG.scene) {
    const xShift = 2;   // static horizontal shift – simulates refraction depth
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, WATER_Y, W, H - WATER_Y);
    ctx.clip();
    ctx.globalAlpha = 0.28;
    ctx.drawImage(IMG.scene, xShift, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 4b ── Surface water band (y=295 → WATER_Y)
  // Tile is 1024×1024 — rendered at 12×12px so detail stays crisp, stacked in rows.
  // Three layers at different speeds, alphas, and sine-wave column offsets.
  if (IMG.surface_tile) {
    const SURF_TOP = 295;
    const TS  = 24;   // tile render size (square preserves detail)
    const bandH = WATER_Y - SURF_TOP;
    const rows  = 3;   // extra row ensures no gap at bottom during wave upswing

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, SURF_TOP, W, bandH + 8);  // extend clip below WATER_Y by max wave amp
    ctx.clip();

    function drawSurfLayer(xOff, yAmp, yFreq, ySpd, alpha) {
      ctx.globalAlpha = alpha;
      const x0 = -(xOff % TS) - TS;
      for (let x = x0; x < W + TS; x += TS) {
        const yWave = yAmp * Math.sin(yFreq * x + ySpd * T);
        for (let r = 0; r < rows; r++) {
          ctx.drawImage(IMG.surface_tile, x, SURF_TOP + r * TS + yWave, TS, TS);
        }
      }
    }

    // Layer 1 – top row, gentler wave
    drawSurfLayer(surfaceOff,        3.5, 0.06, 2.2, 0.45);
    // Layer 2 – offset scroll, bigger wave underneath
    drawSurfLayer(surfaceOff * 1.4,  6.0, 0.04, 1.8, 0.25);

    ctx.globalAlpha = 1;
    ctx.restore();
  }


  // 5 ── Fishing line + plumb bob (animRetract lerps bob toward rod tip)
  const rod = b.rod;
  const bobX = b.x  + (rod.tipX - b.x)  * animRetract;
  const bobY = b.y  + (rod.tipY - b.y)  * animRetract;

  ctx.beginPath();
  ctx.moveTo(rod.tipX, rod.tipY);
  ctx.quadraticCurveTo(
    (rod.tipX + bobX) / 2 + 6 * (1 - animRetract),
    (rod.tipY + bobY) / 2 + 18 * (1 - animRetract),
    bobX, bobY
  );
  ctx.strokeStyle = '#c8b89a';
  ctx.globalAlpha = 0.9;
  ctx.lineWidth   = 1;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // 6 ── Plumb bob (hides at rod tip when fully retracted)
  if (animRetract < 0.98) {
    ctx.beginPath();
    ctx.arc(bobX, bobY, 4 * (1 - animRetract * 0.7), 0, Math.PI * 2);
    ctx.fillStyle = '#c0392b';
    ctx.fill();
    ctx.strokeStyle = '#7b241c';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  const sp = document.getElementById('status-pill');
  const cp = document.getElementById('caught-pill');
  if (biteActive) {
    sp.textContent = '!! BITE !!';
    sp.className = 'hud-pill bite';
  } else if (phase === 'caught') {
    sp.textContent = '★  CAUGHT!';
    sp.className = 'hud-pill caught';
  } else {
    sp.textContent = '~ Waiting...';
    sp.className = 'hud-pill';
  }
  cp.textContent = caughtCount;

  // ── Coordinate inspector ──────────────────────────────────────────────────
  if (inspectorVisible) {
    const ix = inspectorX, iy = inspectorY;
    // crosshair
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,80,0.85)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(ix - 10, iy); ctx.lineTo(ix + 10, iy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ix, iy - 10); ctx.lineTo(ix, iy + 10); ctx.stroke();
    ctx.setLineDash([]);

    // coordinate label
    const label = copiedFlash > 0 ? `✓ Copied!` : `(${ix}, ${iy})`;
    ctx.font = 'bold 11px "Courier New", monospace';
    const tw = ctx.measureText(label).width;
    const lx = Math.min(ix + 14, W - tw - 10);
    const ly = Math.max(iy - 8, 18);
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.beginPath();
    ctx.roundRect(lx - 4, ly - 12, tw + 10, 18, 4);
    ctx.fill();
    ctx.fillStyle = copiedFlash > 0 ? '#7ee8a2' : '#ffff50';
    ctx.fillText(label, lx + 1, ly);

    // hint (bottom-right corner)
    ctx.font = '10px "Courier New", monospace';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W - 126, H - 22, 122, 16);
    ctx.fillStyle = '#aaa';
    ctx.fillText('[I] toggle inspector', W - 122, H - 10);

    ctx.restore();

    if (copiedFlash > 0) copiedFlash -= dt;
  }

  requestAnimationFrame(frame);
}

loadAll(() => requestAnimationFrame(frame));
</script>
</body>
</html>
